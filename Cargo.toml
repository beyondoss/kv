[workspace]
resolver = "2"
members = ["crates/engine", "crates/proto", "crates/server"]

[workspace.package]
edition = "2021"
license = "UNLICENSED"
rust-version = "1.85"

[workspace.dependencies]
beyond-resp = { path = "../resp", features = ["monoio"] }
beyond-kv-engine = { path = "crates/engine" }
beyond-kv-proto = { path = "crates/proto" }

bytes = "1.11"
http = "1.0"
dashmap = "6.1"
mimalloc = { version = "0.1", features = ["v2"] }
monoio = { version = "0.2", features = ["io-uring"] }
monoio-codec = "0.3"
monoio-http = "0.3"
postcard = { version = "1.1", features = ["alloc"] }
rocksdb = "0.24"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2.0"
tracing = "0.1"

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true

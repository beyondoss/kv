[tools]
dprint = "latest"
rust = { version = "1.92", components = "rustfmt,clippy", targets = "aarch64-unknown-linux-gnu,x86_64-unknown-linux-gnu" }
yamlfmt = "latest"
cargo-binstall = "latest"
"cargo:cross" = "latest"

[tasks."build"]
run = "cargo build"

[tasks."build:release"]
run = "cargo build --release"

[tasks."format"]
run = "dprint fmt"

[tasks."test"]
run = "cargo test --test integration_test"

[tasks."test:unit"]
run = "cargo test --lib"

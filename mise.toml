[tools]
dprint = "latest"
node = "22"
rust = { version = "1.92", components = "rustfmt,clippy", targets = "aarch64-unknown-linux-gnu,x86_64-unknown-linux-gnu" }
yamlfmt = "latest"
cargo-binstall = "latest"
"cargo:cross" = "latest"

[tasks."build"]
run = "cargo build"

[tasks."build:release"]
run = "cargo build --release"

[tasks."format"]
run = "dprint fmt"

[tasks."test"]
run = "cargo test --test cross_shard --test http --test resp"

[tasks."test:unit"]
run = "cargo test --lib"

[tasks."sdk:ts:install"]
run = "npm ci"
dir = "sdk/ts"

[tasks."sdk:ts:typecheck"]
run = "npm run typecheck"
dir = "sdk/ts"
depends = ["sdk:ts:install"]

[tasks."sdk:ts:test"]
description = "Run TypeScript SDK e2e tests against a freshly-built debug server"
run = "npm test"
dir = "sdk/ts"
depends = ["sdk:ts:install", "build"]

[tasks."test:all"]
description = "Run unit, integration (Rust), and TypeScript SDK e2e tests"
depends = ["test:unit", "test", "sdk:ts:test"]

[tasks."openapi:generate"]
description = "Generate openapi/v1.json from annotated routes"
run = "cargo run -p beyond-kv -- generate-openapi"

[tasks."sdk:ts:generate-types"]
description = "Generate TypeScript types from the OpenAPI spec"
depends = ["openapi:generate"]
dir = "sdk"
run = "cd ts && node scripts/generate-types.mjs"

[tasks."bench"]
run = "cargo bench -p beyond-kv-engine --bench engine"

[tasks."bench:quick"]
run = "cargo bench -p beyond-kv-engine --bench engine -- --sample-count 20"

# Full honest comparison: Beyond (1 shard) vs Redis, same container, matched
# durability. batch=100 MGET/MSET sweep gives the latency-throughput curve.
# Append --shards=N to run Beyond with N worker threads instead.
[tasks."bench:e2e"]
run = """
TS=$(date -u +%Y-%m-%dT%H-%M-%SZ)
bash crates/bench/docker/run.sh \
  --keys 500000 \
  --value-size 256 \
  --concurrency 64 \
  --duration 30s \
  --warmup 5s \
  --populate \
  --batch 100 \
  --sweep 1k,3k,6k,10k,15k,20k \
  --out "/results/${TS}-e2e-batch100.json" \
  "$@"
"""

# Faster iteration: shorter duration, fewer sweep points, smaller keyspace.
[tasks."bench:e2e:quick"]
run = """
bash crates/bench/docker/run.sh \
  --keys 100000 \
  --value-size 256 \
  --concurrency 32 \
  --duration 10s \
  --warmup 2s \
  --populate \
  --batch 100 \
  --sweep 3k,6k,10k,15k,20k \
  "$@"
"""
